name: Atualizar Cardápio Automaticamente

on:
  schedule:
    # DOMINGO (15h, 18h, 21h, 00h UTC -> 12h, 15h, 18h, 21h Brasília)
    - cron: '0 15,18,21 * * 0'
    - cron: '0 0 * * 1'

    # SEGUNDA-FEIRA (Mais horários: 10h às 22h UTC a cada 2h -> 07h às 19h Brasília)
    - cron: '0 10,12,14,16,18,20,22 * * 1'

    # TERÇA-FEIRA (Alguns poucos horários: 10h, 15h, 20h UTC -> 07h, 12h, 17h Brasília)
    - cron: '0 10,15,20 * * 2'

    # SÁBADO (15h, 18h, 21h UTC -> 12h, 15h, 18h Brasília)
    - cron: '0 15,18,21 * * 6'
    
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar o Scraper
        run: python scraper.py

      - name: Commit e Push (se houver alterações)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          
          if ! git diff --staged --quiet; then
            echo "Alterações detectadas. Fazendo commit e push..."
            git commit -m "Atualiza cardápio da semana"
            git push
          else
            echo "Nenhuma alteração detectada. O PDF é o mesmo ou o conteúdo não mudou."
          fi