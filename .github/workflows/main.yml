name: Atualizar Cardápio Automaticamente

on:
  schedule:
    # Horários de DOMINGO (15h, 18h, 21h, 00h UTC -> 12h, 15h, 18h, 21h Brasília)
    - cron: '0 15,18,21 * * 0'
    - cron: '0 0 * * 1' # Meia-noite de segunda UTC = 21h de domingo BRT

    # Horários de SEGUNDA-FEIRA (10h, 13h, 15h, 17h, 19h UTC -> 07h, 10h, 12h, 14h, 16h, 18h Brasília)
    - cron: '0 10,13,15,17,19,21 * * 1'
    
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar o Scraper
        run: python scraper.py

      - name: Commit e Push (se houver alterações)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Verifica se o index.html foi alterado. Se foi, faz o commit. Se não, encerra silenciosamente.
          git diff --staged --quiet || (git commit -m "Atualiza cardápio da semana" && git push)